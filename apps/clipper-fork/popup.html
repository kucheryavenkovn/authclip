<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthClip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
    }
    .header .version {
      font-size: 11px;
      color: #888;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.4;
    }
    .status.ok { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #fbe9e7; color: #c62828; }
    .status.warn { background: #fff3e0; color: #e65100; }
    .status.info { background: #e3f2fd; color: #1565c0; }
    .status.working { background: #f3e5f5; color: #6a1b9a; }

    .settings {
      margin-bottom: 16px;
    }
    .settings label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .settings input:focus {
      outline: none;
      border-color: #7c3aed;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover:not(:disabled) { background: #e5e7eb; }

    .result {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .result .detail {
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .result .detail:last-child { border-bottom: none; }
    .result .label { color: #666; }
    .result .value { font-weight: 600; }
    .hidden { display: none; }

    .template-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      margin-top: 12px;
      border-top: 1px solid #eee;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }
    .template-toggle:hover { color: #7c3aed; }
    .template-toggle .arrow { transition: transform 0.2s; }
    .template-toggle.open .arrow { transform: rotate(90deg); }

    .template-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .template-panel.open {
      max-height: 600px;
    }
    .template-panel textarea {
      width: 100%;
      min-height: 200px;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
      margin-bottom: 8px;
    }
    .template-panel textarea:focus {
      outline: none;
      border-color: #7c3aed;
    }
    .template-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-save { background: #7c3aed; color: #fff; }
    .btn-save:hover { background: #6d28d9; }
    .btn-reset { background: #f3f4f6; color: #374151; }
    .btn-reset:hover { background: #e5e7eb; }
    .saved-msg {
      font-size: 11px;
      color: #2e7d32;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved-msg.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AuthClip</h1>
    <span class="version" id="version"></span>
  </div>

  <div id="status" class="status info">Checking connection...</div>

  <div class="settings">
    <label for="port">Obsidian Plugin Port</label>
    <input type="number" id="port" value="27124" min="1" max="65535" />
    <label for="token">Auth Token (optional)</label>
    <input type="password" id="token" placeholder="Leave empty if not set" />
  </div>

  <div class="btn-group">
    <button id="btnClip" class="btn-primary" disabled>Clip with Assets</button>
    <button id="btnCheck" class="btn-secondary">Reconnect</button>
  </div>

  <div id="result" class="result hidden"></div>

  <div class="template-toggle" id="templateToggle">
    <span>Template</span>
    <span class="arrow">&#9654;</span>
  </div>
  <div class="template-panel" id="templatePanel">
    <textarea id="templateEditor" spellcheck="false" placeholder="# {{title}}&#10;&#10;{{url}}&#10;&#10;{{content}}"></textarea>
    <div class="template-btns">
      <button class="btn-sm btn-save" id="btnSaveTemplate">Save</button>
      <button class="btn-sm btn-reset" id="btnResetTemplate">Reset Default</button>
      <span class="saved-msg" id="savedMsg">Saved!</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
